# Render Blueprint — https://render.com/docs/blueprint-spec
# Connect this repo in Render Dashboard to auto-detect this file.

services:
  - type: web
    name: ewards-learning-hub-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    repo: https://github.com/somdebmyewards-ship-it/ewards-course-module.git
    branch: main
    plan: free
    healthCheckPath: /api/auth/login
    envVars:
      - key: APP_NAME
        value: "eWards Learning Hub"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        fromService:
          type: web
          name: ewards-learning-hub-api
          property: host
      - key: LOG_LEVEL
        value: warning
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: gateway01.us-east-1.prod.aws.tidbcloud.com
      - key: DB_PORT
        value: "4000"
      - key: DB_DATABASE
        value: ewards_lms
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: MYSQL_ATTR_SSL_CA
        value: /etc/ssl/certs/ca-certificates.crt
      - key: CACHE_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: SESSION_DRIVER
        value: file
      - key: FILESYSTEM_DISK
        value: public
      - key: CORS_ALLOWED_ORIGINS
        value: https://ewards-learning-hub.vercel.app
      - key: SANCTUM_TOKEN_EXPIRATION
        value: "480"
